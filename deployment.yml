apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotstardeploy
  labels:
    app: hotstar
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hotstar
  template:
    metadata:
      labels:
        app: hotstar
    spec:
      containers:
      - name: hotstarcont
        image: rajeshtutta123/rajesh_hotstar-02-04-26:latest
        ports:
        - containerPort: 8080
